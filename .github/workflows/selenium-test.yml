
name: Run Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements
          pip install pytest

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Cache workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .

  test:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Run tests
        run: |
          pytest tests/ -v

      - name: Upload raw test data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: reports/

  report:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-output

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: final-reports
          path: reports/

  cleanup:
    runs-on: ubuntu-latest
    needs: report
    if: always()

    steps:
      - name: Cleanup info
        run: echo "Cleanup completed"
